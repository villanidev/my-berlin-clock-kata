# ============= Profile: prod (Railway) =============
# All sensitive values must be injected via Railway environment variables:
#   CORS_ALLOWED_ORIGINS  e.g. https://your-app.up.railway.app
#   CLOCK_TIMEZONE        e.g. Europe/Berlin

# ============= CORS (injected via env var CORS_ALLOWED_ORIGINS) =============
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# ============= Timezone (injected via env var CLOCK_TIMEZONE) =============
clock.timezone=${CLOCK_TIMEZONE:UTC}

# ============= Logging =============
logging.level.org.springframework.boot=INFO
logging.level.villanidev.berlinclock=INFO
logging.level.villanidev.berlinclock.api.exception=WARN

# ============= Actuator =============
management.endpoint.health.show-details=never
