# ============= Profile: local (docker-compose) =============

# ============= CORS =============
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,https://localhost}

# ============= Timezone =============
clock.timezone=${CLOCK_TIMEZONE:UTC}

# ============= Logging =============
logging.level.villanidev.berlinclock=INFO
logging.level.villanidev.berlinclock.api.controller=DEBUG
logging.level.villanidev.berlinclock.api.exception=WARN

# ============= Actuator =============
management.endpoint.health.show-details=always
