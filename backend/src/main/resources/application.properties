# ============= Spring Boot base (shared across all profiles) =============
spring.application.name=berlin-clock
spring.threads.virtual.enabled=true
spring.lifecycle.timeout-per-shutdown-phase=30s

# ============= OpenAPI / Swagger =============
springdoc.api-docs.path=/api/v1/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============= Tomcat =============
server.port=8080
server.tomcat.threads.max=50
server.tomcat.threads.min-spare=5
server.tomcat.accept-count=20
server.tomcat.max-connections=200
server.tomcat.connection-timeout=20000
server.tomcat.keep-alive-timeout=30000
server.tomcat.max-keep-alive-requests=100
server.shutdown=graceful

# ============= Logging (safe defaults overridden per profile) =============
logging.level.root=WARN
logging.level.villanidev.berlinclock=WARN
logging.level.villanidev.berlinclock.api.exception=WARN

# ============= Actuator (safe defaults overridden per profile) =============
management.endpoints.web.exposure.include=health,metrics,info
management.endpoint.health.show-details=never

# ============= App (must be overridden per profile or via env vars) =============
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:}
clock.timezone=${CLOCK_TIMEZONE:UTC}