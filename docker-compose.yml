services:
  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "local"
      CORS_ALLOWED_ORIGINS: "https://localhost"
      CLOCK_TIMEZONE: "Europe/Brussels"
      PORT: 8080
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

  frontend:
    build:
      context: ./frontend
      args:
        # Empty string → frontend uses relative /api/... URLs, proxied by nginx to backend
        VITE_API_URL: ""
    ports:
      - "80:80"
      - "443:443" # ← added HTTPS port
    volumes:
      - ./frontend/nginx/certs:/etc/nginx/certs:ro # ← mounts the certs
      - ./frontend/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
